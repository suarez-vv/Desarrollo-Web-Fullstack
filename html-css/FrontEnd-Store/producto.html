<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preload" href="css/normalize.css" as="style">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preload" href="css/styles.css" as="style">

<body>
    <header class="header">
        <a href="index.html"> 
            <img class="header__logo" src="img/logo.png" alt="Logotipo"> 
        </a>
    </header>

    <nav class="navegacion">
        <a class="navegacion__enlace" href="index.html">Tienda</a>
        <a class="navegacion__enlace" href="nosotros.html">Nosotros</a>

    <main class="contenedor">
        <h1>React JS</h1>

        <div class="camisa">
            <img class="camisa__imagen" src="img/3.jpg" alt="Imagen del Producto">

            <div class="camisa__contenido">
                <p class="camisa__contenido--descripcion">Cras elit quam, fringilla id gravida sed, sagittis vitae magna. Aenean viverra et quam et vestibulum. Aliquam sit amet nisi id tellus imperdiet accumsan at ac est.</p>

                <form class="formulario">
                    <select class="formulario__campo">
                        <option disabled selected>-- Talla --</option>
                        <option class="formulario__opcion">Chica</option>
                        <option class="formulario__opcion">Mediana</option>

                    </select>
                    <input class="formulario__campo" type="number" placeholder="Cantidad" step="1" min="1">

                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p class="footer__texto">Front End Store - Todos los derechos Reservados 2026 - Suárez, V.V.</p>
